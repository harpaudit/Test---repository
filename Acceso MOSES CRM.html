<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3;url=http://192.168.1.15:5001">
  <title>MOSES CRM — Acceso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      width: 56px; height: 56px;
      background: #2563eb;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; font-weight: 900; color: white;
      margin: 0 auto 1.25rem;
    }
    h1 { font-size: 1.375rem; font-weight: 800; color: #f1f5f9; margin-bottom: .25rem; }
    .sub { font-size: .8125rem; color: #64748b; margin-bottom: 2rem; }
    .url-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: .625rem;
      padding: .875rem 1rem;
      font-family: monospace;
      font-size: .9375rem;
      color: #38bdf8;
      margin-bottom: 1.5rem;
      word-break: break-all;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: .75rem 2rem;
      border-radius: .625rem;
      font-size: .9375rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s;
      margin-bottom: 1.25rem;
    }
    .btn:hover { background: #1d4ed8; }
    .countdown { font-size: .8125rem; color: #475569; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #22c55e;
           border-radius: 50%; margin-right: .375rem; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>MOSES CRM</h1>
    <p class="sub">Solar Pipeline — acceso en red local</p>
    <div class="url-box">http://192.168.1.15:5001</div>
    <a href="http://192.168.1.15:5001" class="btn">Abrir MOSES CRM →</a>
    <p class="countdown">
      <span class="dot"></span>
      Redirigiendo automáticamente en 3 segundos...
    </p>
  </div>
  <script>
    let s = 3;
    const p = document.querySelector('.countdown');
    const t = setInterval(() => {
      s--;
      p.innerHTML = '<span class="dot"></span> Redirigiendo en ' + s + ' segundo' + (s !== 1 ? 's' : '') + '...';
      if (s <= 0) { clearInterval(t); window.location.href = 'http://192.168.1.15:5001'; }
    }, 1000);
  </script>
</body>
</html>
