<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MOSES CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-900/50">
        <span class="text-white font-black text-3xl">M</span>
      </div>
      <h1 class="text-2xl font-bold text-white">MOSES CRM</h1>
      <p class="text-slate-400 text-sm mt-1">Solar Pipeline Management</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-1">Welcome back</h2>
      <p class="text-sm text-gray-500 mb-6">Enter your credentials to continue.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm
          {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
          {% elif category == 'warning' %}bg-yellow-50 text-yellow-700 border border-yellow-200
          {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
          <i class="fa-solid fa-circle-info mr-1"></i> {{ message }}
        </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
        <div class="mb-4">
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i class="fa-solid fa-envelope text-sm"></i>
            </span>
            <input id="email" name="email" type="email" required autocomplete="email"
                   value="{{ request.form.get('email', '') }}"
                   placeholder="user@company.com"
                   class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
          </div>
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i class="fa-solid fa-lock text-sm"></i>
            </span>
            <input id="password" name="password" type="password" required autocomplete="current-password"
                   placeholder="••••••••"
                   class="w-full pl-9 pr-10 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
            <button type="button" onclick="togglePwd()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
              <i id="pwd-icon" class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors shadow-sm">
          <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">HARP Audit &mdash; MOSES Solar CRM</p>
  </div>
  <script>
    function togglePwd() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('pwd-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
